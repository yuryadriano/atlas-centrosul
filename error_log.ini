; Ativar o registo de erros
log_errors = On
; Enviar erros para stderr (visíveis nos logs do Coolify)
error_log = /dev/stderr
; PRODUÇÃO: display_errors DEVE ser Off para não expor caminhos internos
display_errors = Off
; Nível de erro (exclui deprecated e strict em produção)
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
